<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekárska Biológia – Testovač</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --accent2: #7b5ea7;
    --green: #3ecf8e;
    --red: #f56565;
    --yellow: #f6ad55;
    --text: #e8eaf0;
    --muted: #7a7d8c;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .subtitle { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

  .app { display: flex; min-height: calc(100vh - 69px); }

  .sidebar {
    width: 290px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 14px 0;
    position: sticky;
    top: 69px;
    height: calc(100vh - 69px);
  }
  .sidebar-title {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 18px 10px;
  }
  .chapter-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text);
    padding: 9px 18px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.86rem;
    transition: background 0.12s, color 0.12s;
    border-left: 3px solid transparent;
    line-height: 1.4;
  }
  .chapter-btn:hover { background: var(--surface2); color: var(--accent); }
  .chapter-btn.active { background: var(--surface2); border-left-color: var(--accent); color: var(--accent); font-weight: 500; }
  .chapter-btn .ch-num { display: block; font-size: 0.68rem; color: var(--muted); font-weight: 400; }
  .chapter-btn.active .ch-num { color: var(--accent); opacity: 0.7; }

  .main { flex: 1; overflow-y: auto; padding: 28px 36px; max-width: 880px; }

  #home { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; gap: 14px; }
  #home h2 { font-family: 'DM Serif Display', serif; font-size: 2rem; }
  #home p { color: var(--muted); max-width: 460px; }

  .quiz-header { margin-bottom: 24px; }
  .quiz-chapter-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 5px; line-height: 1.3; }
  .quiz-meta { color: var(--muted); font-size: 0.85rem; }

  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
  .btn { padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 0.86rem; font-weight: 500; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7ae8; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .mode-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .mode-select { display: flex; gap: 8px; }
  .mode-btn { padding: 7px 15px; border-radius: 7px; border: 1.5px solid var(--border); background: none; color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.81rem; transition: all 0.15s; }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.08); font-weight: 500; }
  
  .divider { height: 1px; background: var(--border); margin: 18px 0; }

  .question-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 14px; transition: border-color 0.2s; }
  .question-card.revealed-correct { border-color: var(--green); }
  .question-card.revealed-partial { border-color: var(--yellow); }
  .question-card.revealed-wrong { border-color: var(--red); }

  .question-number { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .question-text { font-size: 0.97rem; font-weight: 500; margin-bottom: 16px; line-height: 1.55; }

  .options { display: flex; flex-direction: column; gap: 7px; }
  .option-label { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; border: 1.5px solid var(--border); cursor: pointer; transition: all 0.12s; user-select: none; }
  .option-label:hover:not(.disabled) { border-color: var(--accent); background: rgba(79,142,247,0.06); }

  .option-letter { width: 26px; height: 26px; border-radius: 6px; background: var(--surface2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; flex-shrink: 0; transition: all 0.12s; }
  .option-label.selected .option-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
  .option-label.selected { border-color: var(--accent); }

  .option-label.show-correct { border-color: var(--green); background: rgba(62,207,142,0.1); }
  .option-label.show-correct .option-letter { background: var(--green); border-color: var(--green); color: #fff; }
  .option-label.show-wrong { border-color: var(--red); background: rgba(245,101,101,0.1); }
  .option-label.show-wrong .option-letter { background: var(--red); border-color: var(--red); color: #fff; }
  .option-label.show-missed { border-color: var(--yellow); background: rgba(246,173,85,0.08); }
  .option-label.show-missed .option-letter { background: var(--yellow); border-color: var(--yellow); color: #000; }
  .option-label.disabled { cursor: default; }

  .option-text { flex: 1; font-size: 0.91rem; line-height: 1.45; }

  .check-btn { margin-top: 10px; padding: 7px 17px; border-radius: 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.82rem; font-weight: 500; transition: all 0.15s; }
  .check-btn:hover { border-color: var(--accent); color: var(--accent); }

  .feedback-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 5px 14px; border-radius: 99px; font-size: 0.79rem; font-weight: 600; }
  .feedback-badge.correct { background: rgba(62,207,142,0.18); color: var(--green); }
  .feedback-badge.partial { background: rgba(246,173,85,0.18); color: var(--yellow); }
  .feedback-badge.wrong { background: rgba(245,101,101,0.18); color: var(--red); }

  .results-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; text-align: center; margin-bottom: 22px; }
  .results-score { font-family: 'DM Serif Display', serif; font-size: 3.8rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .results-label { color: var(--muted); margin-top: 2px; font-size: 0.9rem; }
  .results-stats { display: flex; gap: 14px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  .stat-box { background: var(--surface2); border-radius: 10px; padding: 13px 20px; min-width: 85px; }
  .stat-num { font-size: 1.5rem; font-weight: 700; }
  .stat-lbl { font-size: 0.73rem; color: var(--muted); margin-top: 2px; }
  .stat-box.s-correct .stat-num { color: var(--green); }
  .stat-box.s-partial .stat-num { color: var(--yellow); }
  .stat-box.s-wrong .stat-num { color: var(--red); }

  .bottom-controls { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🧬 Lekárska Biológia & Genetika</h1>
    <div class="subtitle">Testovač modelových otázok — Repetitorium 2026</div>
  </div>
</header>

<div class="app">
  <nav class="sidebar">
    <div class="sidebar-title">Kapitoly</div>
    <button class="chapter-btn active" onclick="showHome(this)">
      <span class="ch-num">Úvod</span>
      🏠 Domov
    </button>
    <div id="chapter-list"></div>
  </nav>

  <main class="main" id="main-content">
    <div id="home">
      <h2>Vitaj v testovači!</h2>
      <p>Vyber kapitolu z ľavého menu. Môžeš kontrolovať každú otázku zvlášť, alebo vyhodnotiť celý test naraz na konci.</p>
    </div>
  </main>
</div>

<script>
const QUIZ_DATA = [{"name": "1. Úvod do mikroskopickej techniky", "questions": [{"num": 1, "text": "Aké žiarenie sa využíva pri fluorescenčnej mikroskopii?", "opts": {"a": "infračervené žiarenie", "b": "žiarenie fialovej farby s vlnovou dĺžkou vo viditeľnom spektre", "c": "ultrafialové žiarenie", "d": "prúd elektrónov"}, "correct": {"a": false, "b": false, "c": true, "d": false}}, {"num": 2, "text": "Aké farbivo sa najčastejšie využíva pri vizualizácii chromozómov?", "opts": {"a": "modrý atrament", "b": "Giemsovo", "c": "Lugolov roztok", "d": "hematoxylín a eozín"}, "correct": {"a": false, "b": true, "c": false, "d": false}}, {"num": 3, "text": "Aké zväčšenie získame, ak použijeme objektív s 40x zväčšením a okulár s 10x zväčšením?", "opts": {"a": "400x", "b": "10x", "c": "40x", "d": "4x"}, "correct": {"a": true, "b": false, "c": false, "d": false}}, {"num": 4, "text": "Elektrónové mikroskopy ako zdroj žiarenia používajú:", "opts": {"a": "biele svetlo", "b": "biele svetlo alebo ultrafialové žiarenie", "c": "elektrónkové žiarenie", "d": "prúd elektrónov"}, "correct": {"a": false, "b": false, "c": false, "d": true}}, {"num": 5, "text": "Elektrónové mikroskopy:", "opts": {"a": "ako zdroj žiarenia využívajú prúd fotónov", "b": "nevyžadujú špeciálnu úpravu preparátov", "c": "vyžadujú špeciálnu prípravu preparátov", "d": "ako zdroj žiarenia využívajú prúd elektrónov"}, "correct": {"a": false, "b": false, "c": true, "d": true}}, {"num": 6, "text": "Elektrónový mikroskop:", "opts": {"a": "je typ svetelného mikroskopu, vieme ním pozorovať bunky in vitro aj in vivo", "b": "umožňuje sledovať topológiu buniek a tkanív alebo vnútorné štruktúry", "c": "vieme pozorovať rovnaké preparáty pri SEM aj TEM", "d": "rozlišovacia schopnosť je väčšia ako pri konfokálnom mikroskope, preparáty sa pripravujú špecifickým spôsobom"}, "correct": {"a": false, "b": true, "c": false, "d": true}}, {"num": 7, "text": "Farbenie poznáme:", "opts": {"a": "orientačné", "b": "špecifické", "c": "náhodné", "d": "všeobecné"}, "correct": {"a": true, "b": true, "c": false, "d": false}}, {"num": 8, "text": "Fázový kontrast:", "opts": {"a": "slúži ako zdroj žiarenia pri málo kontrastných preparátoch", "b": "sa využíva na zvýraznenie niektorých štruktúr bunky", "c": "sa v mikroskopii vôbec nepoužíva", "d": "umožňuje pozorovanie priehľadných objektov s málo výrazným kontrastným rozhraním"}, "correct": {"a": false, "b": true, "c": false, "d": true}}, {"num": 9, "text": "Invertovaný mikroskop:", "opts": {"a": "používa sa napr. pri sledovaní bunkových kultúr", "b": "umožňuje pozorovanie preparátov v prechádzajúcom svetle", "c": "je typ elektrónového mikroskopu", "d": "používa metódu osvetlenia zhora"}, "correct": {"a": true, "b": true, "c": false, "d": true}}, {"num": 10, "text": "K mechanickej časti svetelného mikroskopu patrí:", "opts": {"a": "irisová clona", "b": "revolverový menič objektívov", "c": "kondenzor", "d": "objektív"}, "correct": {"a": false, "b": true, "c": false, "d": false}}, {"num": 11, "text": "K osvetľovacej časti mikroskopu patrí:", "opts": {"a": "tubus", "b": "objektívy", "c": "zdroj svetla", "d": "kondenzor"}, "correct": {"a": false, "b": false, "c": true, "d": true}}, {"num": 12, "text": "Konfokálny mikroskop:", "opts": {"a": "je forma svetelného fluorescenčného mikroskopu so zvýšenou rozlišovacou schopnosťou", "b": "ako zdroj svetla využíva lasery s rôznymi excitačnými vlnovými dĺžkami", "c": "pri hrubších rezoch umožňuje selektívne zaostriť a zaznamenať konkrétnu optickú rovinu", "d": "je to druh elektrónového mikroskopu"}, "correct": {"a": true, "b": true, "c": true, "d": false}}, {"num": 13, "text": "Ktorá z nasledujúcich možností je najvhodnejšia na získanie povrchového zobrazenia objektu?", "opts": {"a": "SEM – skenovací elektrónový mikroskop", "b": "TEM – transmisný elektrónový mikroskop", "c": "invertovaný mikroskop", "d": "svetelný mikroskop"}, "correct": {"a": true, "b": false, "c": false, "d": false}}, {"num": 14, "text": "Ktorá z nasledujúcich  {"a": "nemá enzýmy vo virióne", "b": "replikácia prebieha v jadre hostiteľskej bunky", "c": "HPV16 a HPV18 patria medzi high-risk typy spojené s karcinómom krčka maternice", "d": "HPV11 patrí medzi nízkorizikové typy spôsobujúce bradavice"}, "correct": {"a": true, "b": true, "c": true, "d": true}}, {"num": 47, "text": "Epstein–Barrovej vírus (EBV) je spájaný s:", "opts": {"a": "Kaposiho sarkómom", "b": "nazofaryngeálnym karcinómom", "c": "Burkittovým lymfómom", "d": "rakovinou hrubého čreva"}, "correct": {"a": false, "b": true, "c": true, "d": false}}, {"num": 48, "text": "Čo spôsobuje pravé kiahne (variola)?", "opts": {"a": "herpesvírusy", "b": "poxvírusy", "c": "retrovírusy", "d": "adenovírusy"}, "correct": {"a": false, "b": true, "c": false, "d": false}}, {"num": 49, "text": "Ovčie kiahne (varicella) sú spôsobené:", "opts": {"a": "variola vírusom", "b": "herpesvírusmi", "c": "retrovírusmi", "d": "HPV"}, "correct": {"a": false, "b": true, "c": false, "d": false}}, {"num": 50, "text": "Aké sú vlastnosti viroidov?", "opts": {"a": "malé kruhové ssRNA bez obalu", "b": "infekčné proteíny bez nukleových kyselín", "c": "ootrebujú pomocný vírus na replikáciu", "d": "spôsobujú choroby rastlín"}, "correct": {"a": true, "b": false, "c": false, "d": true}}, {"num": 51, "text": "Čo charakterizuje prióny?", "opts": {"a": "malé RNA molekuly bez obalu", "b": "infekčné proteíny bez nukleových kyselín", "c": "prenášajú sa medzi druhmi", "d": "potrebujú pomocný vírus na replikáciu"}, "correct": {"a": false, "b": true, "c": true, "d": false}}, {"num": 52, "text": "Čo je reassortment v prípade vírusov so segmentovaným genómom?", "opts": {"a": "rekombinácia v rámci jednej molekuly RNA", "b": "výmena celých segmentov medzi dvoma vírusmi infikujúcimi jednu bunku", "c": "proces zodpovedný za antigénny drift", "d": "proces, ktorý vedie k antigénnemu shiftu"}, "correct": {"a": false, "b": true, "c": false, "d": true}}, {"num": 53, "text": "Ktoré mechanizmy poháňajú evolúciu vírusov?", "opts": {"a": "mutácie", "b": "rekombinácie", "c": "reassortment", "d": "horizontálny prenos génov medzi hostiteľmi"}, "correct": {"a": true, "b": true, "c": true, "d": false}}, {"num": 54, "text": "Ktoré tvrdenia správne popisujú rozdiel medzi antigénnym driftom a antigénnym shiftom?", "opts": {"a": "drift predstavuje malé, postupné zmeny antigénov", "b": "shift predstavuje zásadné zmeny antigénov", "c": "drift je spôsobený mutáciami bez korektúry polymeráz", "d": "shift je výsledok reassortmentu segmentovaného genómu"}, "correct": {"a": true, "b": true, "c": true, "d": true}}, {"num": 55, "text": "Prečo majú ssRNA vírusy vysoké mutačné tempo?", "opts": {"a": "ich polymerázam chýba korektúra", "b": "majú segmentovaný genóm", "c": "obsahujú veľký počet regulačných génov", "d": "ich replikácia prebieha v jadre hostiteľa"}, "correct": {"a": true, "b": false, "c": false, "d": false}}, {"num": 56, "text": "Čo je typické pre lytický cyklus?", "opts": {"a": "vírusový genóm sa integruje do DNA hostiteľa", "b": "dochádza k okamžitej syntéze viriónov", "c": "infekcia končí lýzou hostiteľskej bunky", "d": "vírus pretrváva dlhodobo v latentnej forme"}, "correct": {"a": false, "b": true, "c": true, "d": false}}, {"num": 57, "text": "Čo je charakteristické pre lyzogénny cyklus bakteriofágov?", "opts": {"a": "genóm vírusu sa začleňuje do DNA hostiteľa ako profág", "b": "replikácia viriónov prebieha okamžite po infekcii", "c": "aktivácia represora bráni expresii génov lytického cyklu", "d": "vírus sa množí výlučne v cytoplazme"}, "correct": {"a": true, "b": false, "c": true, "d": false}}, {"num": 58, "text": "Čo môže spôsobiť prechod lyzogénneho cyklu do lytického?", "opts": {"a": "aktivácia represora", "b": "inaktivácia represora v dôsledku stresu (UV žiarenie, chemikálie)", "c": "spontánna integrácia DNA do chromozómu hostiteľa", "d": "vysoká virulencia vírusu"}, "correct": {"a": false, "b": true, "c": false, "d": false}}, {"num": 59, "text": "Ktoré tvrdenie správne opisuje rozdiel medzi lytickým a lyzogénnym cyklom?", "opts": {"a": "lytický cyklus vedie k deštrukcii hostiteľskej bunky, lyzogénny nie", "b": "v lyzogénnom cykle vírus okamžite produkuje nové častice", "c": "lytický cyklus zahŕňa integráciu genómu vírusu do DNA hostiteľa", "d": "lyzogénny cyklus umožňuje vírusu perzistovať latentne v hostiteľovi"}, "correct": {"a": true, "b": false, "c": false, "d": true}}, {"num": 60, "text": "Ktoré tvrdenia o víruse SARS-CoV-2 (pôvodca COVID-19) sú správne?", "opts": {"a": "ide o RNA vírus s pozitívnym jednovláknovým genómom (+ssRNA)", "b": "patrí do čeľade Coronaviridae, rodu Betacoronavirus", "c": "povrchový glykoproteín „spike“ sprostredkuje väzbu na receptor ACE2 hostiteľskej bunky", "d": "obsahuje reverznú transkriptázu a integruje sa do DNA hostiteľa"}, "correct": {"a": true, "b": true, "c": true, "d": false}}]}];

let currentChapter = null;
let userAnswers = {};
let revealed = {};
let testRevealed = false;
let mode = 'check-each';
let shuffleEnabled = false;
let shuffledQuestions = [];
let optionOrder = {}; // {qIdx: ['a','b','c','d'] shuffled}

function buildSidebar() {
  const list = document.getElementById('chapter-list');
  QUIZ_DATA.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'chapter-btn';
    btn.innerHTML = `<span class="ch-num">Kapitola ${i+1} &bull; ${ch.questions.length} otázok</span>${ch.name}`;
    btn.onclick = () => loadChapter(i, btn);
    list.appendChild(btn);
  });
}

function showHome(btn) {
  document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('main-content').innerHTML = `<div id="home"><h2>Vitaj v testovači!</h2><p>Vyber kapitolu z ľavého menu. Môžeš kontrolovať každú otázku zvlášť, alebo vyhodnotiť celý test naraz na konci.</p></div>`;
  currentChapter = null;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function applyShuffleToChapter(idx) {
  const qs = QUIZ_DATA[idx].questions;
  if (shuffleEnabled) {
    shuffledQuestions = shuffle(qs.map((_, i) => i));
    optionOrder = {};
    shuffledQuestions.forEach(qIdx => {
      const q = qs[qIdx];
      const letters = ['a','b','c','d'].filter(l => q.opts[l]);
      optionOrder[qIdx] = shuffle(letters);
    });
  } else {
    shuffledQuestions = qs.map((_, i) => i);
    optionOrder = {};
    shuffledQuestions.forEach(qIdx => {
      const q = qs[qIdx];
      optionOrder[qIdx] = ['a','b','c','d'].filter(l => q.opts[l]);
    });
  }
}

function toggleShuffle() {
  shuffleEnabled = !shuffleEnabled;
  if (currentChapter !== null) {
    userAnswers = {};
    revealed = {};
    testRevealed = false;
    applyShuffleToChapter(currentChapter);
    renderQuiz();
  }
}

function loadChapter(idx, btn) {
  document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentChapter = idx;
  userAnswers = {};
  revealed = {};
  testRevealed = false;
  applyShuffleToChapter(idx);
  renderQuiz();
}

function renderQuiz() {
  const ch = QUIZ_DATA[currentChapter];
  const qs = ch.questions;
  const mc = document.getElementById('main-content');

  let html = `
  <div class="quiz-header">
    <div class="quiz-chapter-title">${ch.name}</div>
    <div class="quiz-meta">${qs.length} otázok &bull; Môže byť viac správnych odpovedí (A–D)</div>
  </div>
  <div class="controls">
    <div>
      <div class="mode-label">Režim</div>
      <div class="mode-select">
        <button class="mode-btn ${mode==='check-each'?'active':''}" onclick="setMode('check-each')">✔ Kontrola po otázkach</button>
        <button class="mode-btn ${mode==='submit-all'?'active':''}" onclick="setMode('submit-all')">📋 Vyhodnotiť celý test</button>
      </div>
    </div>
    <div>
      <div class="mode-label">Náhodné poradie</div>
      <div class="mode-select">
        <button class="mode-btn ${shuffleEnabled?'active':''}" onclick="toggleShuffle()">🔀 ${shuffleEnabled ? 'Zapnuté' : 'Vypnuté'}</button>
      </div>
    </div>
  </div>
  <div class="divider"></div>`;

  if (testRevealed) html += renderResults(qs);

  shuffledQuestions.forEach((qIdx, displayIdx) => { html += renderQuestion(QUIZ_DATA[currentChapter].questions[qIdx], displayIdx, qIdx); });

  if (mode === 'submit-all') {
    html += `<div class="bottom-controls">
      <button class="btn btn-primary" onclick="submitAll()">📊 Vyhodnotiť test</button>
      <button class="btn btn-secondary" onclick="resetAll()">🔄 Resetovať</button>
    </div>`;
  } else {
    html += `<div class="bottom-controls"><button class="btn btn-secondary" onclick="resetAll()">🔄 Resetovať test</button></div>`;
  }

  mc.innerHTML = html;
  mc.scrollTop = 0;
}

function renderResults(qs) {
  let correct = 0, partial = 0, wrong = 0;
  shuffledQuestions.forEach((qIdx, displayIdx) => {
    const g = gradeQuestion(QUIZ_DATA[currentChapter].questions[qIdx], displayIdx);
    if (g === 'correct') correct++;
    else if (g === 'partial') partial++;
    else wrong++;
  });
  const pct = Math.round((correct / qs.length) * 100);
  return `<div class="results-card">
    <div class="results-score">${pct}%</div>
    <div class="results-label">Celkový výsledok testu</div>
    <div class="results-stats">
      <div class="stat-box s-correct"><div class="stat-num">${correct}</div><div class="stat-lbl">Správne</div></div>
      <div class="stat-box s-partial"><div class="stat-num">${partial}</div><div class="stat-lbl">Čiastočne</div></div>
      <div class="stat-box s-wrong"><div class="stat-num">${wrong}</div><div class="stat-lbl">Nesprávne</div></div>
    </div>
  </div>`;
}

function gradeQuestion(q, i, qIdx) {
  if (qIdx === undefined) qIdx = shuffledQuestions ? shuffledQuestions[i] : i;
  const ans = userAnswers[i] || {};
  const letters = ['a','b','c','d'];
  let allCorrect = true, anyCorrect = false, anyWrong = false;
  letters.forEach(l => {
    const sel = !!ans[l], cor = q.correct[l];
    if (sel && cor) anyCorrect = true;
    if (sel && !cor) { anyWrong = true; allCorrect = false; }
    if (!sel && cor) allCorrect = false;
  });
  if (allCorrect && anyCorrect) return 'correct';
  if (anyCorrect && !anyWrong) return 'partial';
  return 'wrong';
}

function renderQuestion(q, i, qIdx) {
  if (qIdx === undefined) qIdx = i;
  const ans = userAnswers[i] || {};
  const isRev = revealed[i] || testRevealed;
  const letters = optionOrder[qIdx] || ['a','b','c','d'];

  let cardClass = 'question-card';
  let feedbackHtml = '';
  if (isRev) {
    const g = gradeQuestion(q, i);
    if (g === 'correct') { cardClass += ' revealed-correct'; feedbackHtml = `<div class="feedback-badge correct">✓ Správne!</div>`; }
    else if (g === 'partial') { cardClass += ' revealed-partial'; feedbackHtml = `<div class="feedback-badge partial">◑ Čiastočne správne</div>`; }
    else { cardClass += ' revealed-wrong'; feedbackHtml = `<div class="feedback-badge wrong">✗ Nesprávne</div>`; }
  }

  let optsHtml = '';
  letters.forEach(l => {
    if (!q.opts[l]) return;
    const sel = !!ans[l], cor = q.correct[l];
    let cls = 'option-label';
    if (sel) cls += ' selected';
    if (isRev) {
      cls += ' disabled';
      if (sel && cor) cls += ' show-correct';
      else if (sel && !cor) cls += ' show-wrong';
      else if (!sel && cor) cls += ' show-missed';
    }
    const click = isRev ? '' : `onclick="toggleOption(${i}, '${l}', ${qIdx})"`;
    optsHtml += `<div class="${cls}" ${click}>
      <div class="option-letter">${l.toUpperCase()}</div>
      <span class="option-text">${q.opts[l]}</span>
    </div>`;
  });

  const checkBtn = (mode === 'check-each' && !isRev)
    ? `<button class="check-btn" onclick="checkQuestion(${i})">Skontrolovať odpoveď</button>`
    : '';

  return `<div class="${cardClass}" id="q-${i}">
    <div class="question-number">Otázka ${q.num}</div>
    <div class="question-text">${q.text}</div>
    <div class="options">${optsHtml}</div>
    ${checkBtn}${feedbackHtml}
  </div>`;
}

function toggleOption(displayIdx, letter, origQIdx) {
  if (!userAnswers[displayIdx]) userAnswers[displayIdx] = {};
  userAnswers[displayIdx][letter] = !userAnswers[displayIdx][letter];
  const q = QUIZ_DATA[currentChapter].questions[origQIdx];
  document.getElementById('q-'+displayIdx).outerHTML = renderQuestion(q, displayIdx, origQIdx);
}

function checkQuestion(displayIdx) {
  revealed[displayIdx] = true;
  const origQIdx = shuffledQuestions[displayIdx];
  const q = QUIZ_DATA[currentChapter].questions[origQIdx];
  document.getElementById('q-'+displayIdx).outerHTML = renderQuestion(q, displayIdx, origQIdx);
}

function submitAll() {
  testRevealed = true;
  renderQuiz();
}

function resetAll() {
  userAnswers = {};
  revealed = {};
  testRevealed = false;
  if (currentChapter !== null) applyShuffleToChapter(currentChapter);
  renderQuiz();
}

function setMode(m) {
  mode = m;
  if (currentChapter !== null) {
    userAnswers = {};
    revealed = {};
    testRevealed = false;
    applyShuffleToChapter(currentChapter);
    renderQuiz();
  }
}

buildSidebar();
shuffledQuestions = [];
optionOrder = {};
</script>
</body>
</html>
